{% if page.comments != false and site.comments.provider %}
<div class="comments" id="comments">
  <h2 class="comments-title">Comments</h2>
  <div id="disqus_thread"></div>
  <script>
    var disqus_config = function () {
      this.page.url = "{{ page.url | absolute_url }}";
      this.page.identifier = "{{ page.id | default: page.url }}";
    };
    (function() {
      var d = document, s = d.createElement('script');
      s.src = 'https://{{ site.comments.disqus_shortname }}.disqus.com/embed.js';
      s.async = true;
      s.onload = function() {
        var loadInterval = setInterval(function() {
          if (d.getElementById('disqus_thread')) {
            clearInterval(loadInterval);
          }
        }, 100);
      };
      (d.head || d.body).appendChild(s);
    })();
  </script>
  <noscript>Please enable JavaScript to view the <a href="https://disqus.com/?ref_noscript" target="_blank" rel="noopener">comments powered by Disqus.</a></noscript>
</div>
{% elsif page.comments == true %}
<div class="comments" id="comments">
  <h2 class="comments-title">Comments</h2>
  <div class="comments-disabled">
    <p class="comments-disabled-message">Comments are currently disabled. Please <a href="https://github.com/{{ site.github_username }}/issues" target="_blank" rel="noopener">open an issue on GitHub</a> to discuss this post.</p>
  </div>
</div>
{% endif %}
