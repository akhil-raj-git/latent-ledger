# Site configuration for Jekyll
# See https://jekyllrb.com/docs/configuration/ for more settings

title: "Latent Ledger"
description: "Documenting the space between research and reality — AI, ML, and Agentic Engineering insights"
author: "Akhil Raj"
email: ""
twitter_username: ""
github_username: "akhil-raj-git"
linkedin_username: ""

# URL settings (adjust for production)
url: "https://akhil-raj-git.github.io/latent-ledger"
baseurl: "" # empty for root domain, "/reponame" for project pages

# Build settings
markdown: kramdown
highlighter: rouge
lsi: false
excerpt_separator: "\n\n"
incremental: false

# Navigation
nav:
  - title: "Home"
    url: "/"
  - title: "Papers"
    url: "/papers/"
  - title: "Code"
    url: "/code/"
  - title: "About"
    url: "/about/"

# Collections for organizing content
collections:
  papers:
    output: true
    permalink: /papers/:path/
  code:
    output: true
    permalink: /code/:path/
  posts:
    output: true
    permalink: /blog/:year/:month/:day/:title/

# Default layouts
defaults:
  - scope:
      path: ""
      type: "papers"
    values:
      layout: "single"
  - scope:
      path: ""
      type: "code"
    values:
      layout: "single"
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "single"

# Plugin settings (GitHub Pages supported plugins only)
plugins:
  - jekyll-paginate
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-include-cache

# Category/Tag settings
categories_page: /categories/
tags_page: /tags/

# Archive settings
jekyll-archives:
  enabled:
    - categories
    - tags
  layout: archive
  permalinks:
    category: /category/:name/
    tag: /tag/:name/

# License
license:
  name: "CC BY 4.0"
  url: "https://creativecommons.org/licenses/by/4.0/"