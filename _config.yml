# Site configuration for Jekyll
# See https://jekyllrb.com/docs/configuration/ for more settings

title: "Latent Ledger"
description: "Documenting the space between research and reality — AI, ML, and Agentic Engineering insights"
author: "Akhil Raj"
email: ""
twitter_username: ""
github_username: "akhil-raj-git"
# Source for this site (nav GitHub icon opens here)
github_repository_url: "https://github.com/akhil-raj-git/latent-ledger"
linkedin_username: ""

# URL settings (GitHub Pages project site lives under /latent-ledger/)
url: "https://akhil-raj-git.github.io"
baseurl: "/latent-ledger"

# Post URLs (do not define `posts` under collections — that breaks the built-in posts collection)
permalink: /blog/:year/:month/:day/:title/

# Build settings
markdown: kramdown
highlighter: rouge
lsi: false
excerpt_separator: "\n\n"
incremental: false

# Navigation
nav:
  - title: "Home"
    url: "/"
  - title: "Blog"
    url: "/blog/"
  - title: "Papers"
    url: "/papers/"
  - title: "Code"
    url: "/code/"
  - title: "About"
    url: "/about/"

# Collections for organizing content
collections:
  papers:
    output: true
    permalink: /papers/:path/
  code:
    output: true
    permalink: /code/:path/

# Default layouts
defaults:
  - scope:
      path: ""
      type: "papers"
    values:
      layout: "single"
  - scope:
      path: ""
      type: "code"
    values:
      layout: "single"
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "single"

# Styles and layouts live in this repo (_layouts, _includes, assets/css).

# Plugin settings (GitHub Pages supported plugins only)
plugins:
  - jekyll-paginate
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-include-cache

# Category/Tag settings
categories_page: /categories/
tags_page: /tags/

# License
license:
  name: "CC BY 4.0"
  url: "https://creativecommons.org/licenses/by/4.0/"