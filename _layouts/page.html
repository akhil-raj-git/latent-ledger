---
layout: default
---

<div class="container py-8">
  <header class="page-header mb-6">
    <h1 class="page-title">{{ page.title | default: site.title }}</h1>
    {% if page.subtitle %}
    <p class="page-subtitle">{{ page.subtitle }}</p>
    {% endif %}
  </header>

  <div class="page-body">
    {{ content }}
  </div>
</div>
