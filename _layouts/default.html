<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: "en" }}">
  <head>
    {%- include head.html -%}
  </head>

  <body class="layout--{{ page.layout | default: 'default' }}{% if page.classes | join: '' == 'home' %} layout--home{% endif %}">

    <main id="main-content" class="main-content">

    {%- include footer.html -%}
    {%- include scripts.html -%}
  </body>
</html>
