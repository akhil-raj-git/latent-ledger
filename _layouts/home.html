---
layout: default
---

<div class="hero">
  <h1 class="hero-title">{{ page.title | default: site.title }}</h1>
  {% if page.subtitle %}
  <p class="hero-subtitle">{{ page.subtitle }}</p>
  {% endif %}
  <div class="hero-buttons">
    <a href="#latest-papers" class="btn btn--primary">Read Papers</a>
    <a href="#latest-code" class="btn btn--outline">Explore Code</a>
  </div>
</div>

<div class="container py-8">
  {{ content }}
</div>
