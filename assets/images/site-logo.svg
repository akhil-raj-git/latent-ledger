<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 100">
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1d4ed8;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background with subtle pattern -->
  <rect width="400" height="100" fill="none"/>
  
  <!-- Main Logo Text -->
  <text x="20" y="65" font-family="system-ui, -apple-system, sans-serif" font-size="48" font-weight="800" fill="#1e293b">
    Latent
  </text>
  <text x="180" y="65" font-family="system-ui, -apple-system, sans-serif" font-size="48" font-weight="800" fill="url(#gradient)">
    Ledger
  </text>
  
  <!-- Subtitle -->
  <text x="20" y="85" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#64748b">
    AI RESEARCH & ENGINEERING
  </text>
  
  <!-- Decorative element -->
  <circle cx="350" cy="30" r="10" fill="#2563eb" opacity="0.2"/>
  <circle cx="350" cy="30" r="20" fill="#2563eb" opacity="0.1"/>
  <circle cx="350" cy="30" r="30" fill="#2563eb" opacity="0.05"/>
</svg>